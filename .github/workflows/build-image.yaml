name: Build image

on:
  push:
    branches:
      - main
      - docker
      - 'dual-release-v*'
  pull_request:
    branches:
      - main
      - 'dual-release-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          REF_NAME="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          R="us-docker.pkg.dev/aptos-registry/docker/prover-service"
          # Sanitize ref name for use in Docker tags (replace / with -)
          TAG_SAFE_REF=$(echo "$REF_NAME" | tr '/' '-')
          {
            echo "tags<<ENDOFTAGS"
            echo "${R}:${TAG_SAFE_REF}-latest"
            echo "${R}:${SHA}"
            if [ "$REF_NAME" = "main" ]; then echo "${R}:latest"; fi
            echo "ENDOFTAGS"
          } >> "$GITHUB_OUTPUT"

      - id: auth
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v1"
        with:
          create_credentials_file: false
          token_format: "access_token"
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Login to us-central1 Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prover-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
